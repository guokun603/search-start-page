<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>搜索主页</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 快速背景预载：在样式表解析前立即应用上次壁纸，消除白屏闪烁 -->
  <script>
    (function () {
      try {
        var u = localStorage.getItem('bgCache');
        if (u && (u.startsWith('https://') || u.startsWith('http://') || u.startsWith('data:image/'))) {
          var s = document.createElement('style');
          s.textContent = 'html{background:url("' + u.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '") center/cover no-repeat fixed}';
          document.head.appendChild(s);
        }
      } catch (e) {}
    }());
  </script>

  <!-- 样式 -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 背景层 -->
  <div class="bg" id="bgLayer"></div>
  <!-- 立即将缓存背景应用到 bgLayer，消除 JS 初始化期间的黑屏 -->
  <script>
    (function () {
      try {
        var u = localStorage.getItem('bgCache');
        // 只允许已知安全的 URL 格式：data:image/ 的 base64（无特殊字符）和 http(s) URL
        var safe = u && (
          (u.startsWith('data:image/') && /^data:image\/[a-z]+;base64,[A-Za-z0-9+/=]+$/.test(u)) ||
          (u.startsWith('https://') || u.startsWith('http://')) && /^https?:\/\/[^\s"'\\<>]+$/.test(u)
        );
        if (safe) {
          var layer = document.getElementById('bgLayer');
          if (layer) {
            // 先应用缓存 URL 以立即恢复背景，再异步探测图片是否真的可加载
            layer.style.backgroundImage = 'url("' + u + '")';
            var probe = new Image();
            probe.onload = function () {
              // 图片加载成功，背景已正确显示，无需额外操作
            };
            probe.onerror = function () {
              // 图片加载失败（网络不通等），清除失效缓存；main.js 会负责设置正确的背景
              try { localStorage.removeItem('bgCache'); } catch (e) {}
            };
            probe.src = u;
          }
        }
      } catch (e) {}
    }());
  </script>

   <!-- 背景视频层：动态壁纸 -->
  <video
    id="bgVideo"
    autoplay
    muted
    loop
    playsinline
  ></video>


  <!-- 头部：切换壁纸按钮 -->
  <header class="site-header">
    <div class="wallpaper-area">
      <button class="wallpaper-btn" id="wallpaperBtn">切换壁纸</button>
    </div>
  </header>

  <!-- 主体：时钟 + 搜索框 -->
  <main class="center">
    <div class="clock" id="clock">--:--:--</div>
    <form class="search-box" id="searchForm">
      <!-- 覆盖层：未聚焦时只看到它 -->
      <div class="search-overlay" id="searchOverlay">
        搜索
      </div>

      <div class="engine-selector" id="engineSelector">
        <div class="logo" id="engineLogo"></div>
        <span class="engine-arrow">▾</span>
        <div class="engine-dropdown" id="engineDropdown"></div>
      </div>

      <input
        class="search-input"
        id="q"
        type="search"
        placeholder="请输入需要搜索的内容"
        autocomplete="off"
      />
      <button class="search-btn" type="submit">搜索</button>
    </form>
  </main>

  <!-- 底部文案 -->
  <footer class="footer" id="footerText">
    因为痛苦太有价值，因为回忆太珍贵，所以我们要继续往前走。——《五月天》<br>
    © 2026 郭小胖
  </footer>

  <!-- 左侧壁纸面板 -->
  <aside class="wallpaper-panel" id="wallpaperPanel" aria-hidden="true">
    <div class="wallpaper-panel-inner">
      <!-- 壁纸缩略图列表 -->
      <div class="wallpaper-list" id="wallpaperList"></div>
    </div>
  </aside>

  <!-- 隐藏的本地图片/视频选择控件 -->
  <input
    type="file"
    id="wallpaperFileInput"
    accept="image/*,video/*"
    style="display:none"
  />

  <!-- 脚本 -->
  <script src="main.js"></script>
</body>
</html>
